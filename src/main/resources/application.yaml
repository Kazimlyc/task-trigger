server:
  port: 8081

spring:
  application:
    name: task-trigger
  datasource:
    url: jdbc:postgresql://localhost:5433/task_db
    username: taskuser
    password: taskpassword
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest